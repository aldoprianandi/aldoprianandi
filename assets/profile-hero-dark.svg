<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Aldo Prianandi dark profile hero</title>
  <desc id="desc">Dark themed GitHub profile hero with subtle grid, blue and orange accents, and text about automation and systems.</desc>
  <defs>
    <linearGradient id="bg" x1="82" y1="24" x2="1224" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1120"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accentA" x1="869" y1="28" x2="1136" y2="157" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="accentB" x1="896" y1="203" x2="1112" y2="318" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FB923C"/>
      <stop offset="1" stop-color="#F472B6"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#334155" stroke-opacity="0.58" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="360" rx="28" fill="url(#bg)"/>
  <rect x="24" y="24" width="1232" height="312" rx="22" fill="url(#grid)" opacity="0.6"/>
  <rect x="24" y="24" width="1232" height="312" rx="22" stroke="#334155" stroke-opacity="0.88"/>

  <circle cx="1037" cy="96" r="96" fill="url(#accentA)" opacity="0.18"/>
  <circle cx="996" cy="263" r="78" fill="url(#accentB)" opacity="0.18"/>
  <rect x="866" y="58" width="246" height="178" rx="24" fill="#111827" fill-opacity="0.82" stroke="#475569" stroke-opacity="0.7"/>
  <rect x="927" y="206" width="190" height="92" rx="18" fill="#E2E8F0" fill-opacity="0.96"/>

  <rect x="74" y="66" width="132" height="34" rx="17" fill="#111827" stroke="#475569"/>
  <text x="140" y="88" text-anchor="middle" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">GITHUB PROFILE</text>

  <text x="74" y="152" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700">Aldo Prianandi</text>
  <text x="74" y="194" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="400">Automation systems, internal tools, and practical interfaces.</text>
  <text x="74" y="238" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400">Focused on reducing friction, simplifying workflows, and building tools that are clear to use.</text>

  <rect x="74" y="268" width="142" height="34" rx="17" fill="#F8FAFC"/>
  <text x="145" y="290" text-anchor="middle" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">AUTOMATION</text>
  <rect x="230" y="268" width="110" height="34" rx="17" fill="#0F172A" stroke="#475569"/>
  <text x="285" y="290" text-anchor="middle" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">SYSTEMS</text>
  <rect x="354" y="268" width="118" height="34" rx="17" fill="#0F172A" stroke="#475569"/>
  <text x="413" y="290" text-anchor="middle" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">FRONTEND</text>

  <text x="899" y="108" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">CURRENT SIGNAL</text>
  <text x="899" y="140" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="14">Build useful things.</text>
  <text x="899" y="166" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="14">Keep them operable.</text>
  <text x="899" y="192" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="14">Cut unnecessary steps.</text>

  <text x="958" y="242" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700">WORKFLOW</text>
  <text x="958" y="265" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="13">design</text>
  <text x="1040" y="265" fill="#E11D48" font-family="Arial, Helvetica, sans-serif" font-size="13">execute</text>
  <text x="983" y="286" fill="#15803D" font-family="Arial, Helvetica, sans-serif" font-size="13">refine</text>
</svg>
